<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>GRAIL Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>GRAIL アイコン生成ツール</h2>
<p style="color:#888;font-size:13px">ボタンをクリックするとアイコンPNGがダウンロードされます</p>

<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>

<div style="margin:24px 0">
  <canvas id="preview" width="192" height="192" style="border:1px solid #333;border-radius:12px"></canvas>
</div>

<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
  <button onclick="download(192)" style="padding:12px 24px;background:#fff;color:#000;border:none;cursor:pointer;font-size:13px;letter-spacing:.1em">apple-touch-icon.png をダウンロード</button>
  <button onclick="download(512)" style="padding:12px 24px;background:#fff;color:#000;border:none;cursor:pointer;font-size:13px;letter-spacing:.1em">pwa-icon-512.png をダウンロード</button>
</div>

<p style="color:#555;font-size:11px;margin-top:24px">
  ダウンロードしたファイルを <code style="color:#aaa">icons/</code> フォルダに置いてください
</p>

<script>
function drawIcon(canvas) {
  const size = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = size * 0.12; // 角丸

  // 背景（黒・角丸）
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // テキスト「GRAIL」
  const fs = size * 0.22;
  ctx.fillStyle = '#ffffff';
  ctx.font = `600 ${fs}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = `${size * 0.018}px`;
  ctx.fillText('GRAIL', size / 2, size * 0.44);

  // サブテキスト「ARCHIVE」
  const fs2 = size * 0.085;
  ctx.font = `300 ${fs2}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('ARCHIVE', size / 2, size * 0.62);
}

// プレビュー描画
const preview = document.getElementById('preview');
drawIcon(preview);

function download(sz) {
  const id = 'c' + sz;
  const canvas = document.getElementById(id);
  drawIcon(canvas);
  const link = document.createElement('a');
  link.download = `sz===192?"apple-touch-icon.png":"pwa-icon-512.png"`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
